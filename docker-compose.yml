version: '3.8'

services:
  # --- INFRASTRUCTURE ---
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: redpanda
    command:
      - redpanda
      - start
      - --smp 1
      - --mode dev-container
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
    ports:
      - 19092:19092
      - 9092:9092

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - 6379:6379

  # --- APPLICATION SERVICES ---
  
  # The Brain: ML Inference API
  ml-service:
    build: .
    container_name: ml-service
    command: uvicorn ml_service:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis

  # The Stream Processor: Fraud Detector
  detector:
    build: .
    container_name: detector
    command: python detector.py
    depends_on:
      - redpanda
      - redis
      - ml-service
    environment:
      - KAFKA_BROKER=redpanda:9092
      - REDIS_HOST=redis
      - ML_SERVICE_URL=http://ml-service:8000/predict
    ports:
      - "8001:8001" # Prometheus metrics

  # The Source: Transaction Generator
  generator:
    build: .
    container_name: generator
    command: python generator.py
    depends_on:
      - redpanda
      - redis
    environment:
      - KAFKA_BROKER=redpanda:9092
      - REDIS_HOST=redis

  # --- OBSERVABILITY ---
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
  
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus