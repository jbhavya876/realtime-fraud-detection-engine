name: Fraud Engine CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-verify:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Verify Python Microservices Build (ML & Generator)
      run: |
        docker compose build ml-service
        docker compose build generator
        docker compose build frontend

    - name: Verify Rust Stream Processor Build
      run: |
        docker compose build detector

    - name: Infrastructure Integration Test (Dry Run)
      run: |
        docker compose up -d
        sleep 15  # Wait for services to initialize
        docker compose ps
        docker compose down